<!DOCTYPE html>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#555;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
  }
  .stage {
    width:1080px; height:1080px;
    background:#F2E6CE;
    position:relative; overflow:hidden; flex-shrink:0;
  }
  .stage::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 45%, rgba(217,188,102,0.28) 0%, transparent 65%);
    pointer-events:none; z-index:0;
  }
  .bocha {
    position:absolute; z-index:1;
  }
  .bocha img {
    display:block; mix-blend-mode:multiply;
    width:100%; height:100%; object-fit:contain;
  }
  .pata {
    position:absolute; z-index:2;
  }
  .texto {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%, -50%);
    text-align:center; z-index:20;
    white-space:nowrap; pointer-events:none;
  }
  .texto-principal {
    font-family:'Playfair Display', Georgia, serif;
    font-size:64px; font-style:italic; font-weight:900;
    color:#3D1F0A; line-height:1.2;
    text-shadow:3px 3px 0 rgba(242,230,206,0.95), -1px -1px 0 rgba(242,230,206,0.8);
  }
  .texto-puntos { color:#D95B5B; }
  .logo-final {
    position:absolute; bottom:52px; left:50%;
    transform:translateX(-50%);
    text-align:center; z-index:20; white-space:nowrap;
  }
  .logo-nombre {
    font-family:'Playfair Display', Georgia, serif;
    font-size:40px; font-style:italic; font-weight:900;
    color:#3D1F0A; letter-spacing:2px;
  }
  .logo-sub {
    font-family:'Oswald', sans-serif;
    font-size:13px; letter-spacing:6px; text-transform:uppercase;
    color:#D95B5B; margin-top:5px;
  }
  .instrucciones {
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.65); color:#fff;
    padding:7px 18px; border-radius:20px;
    font-size:12px; font-family:sans-serif; z-index:999;
  }
</style>
</head>
